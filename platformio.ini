[platformio]
default_envs = master

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps =
    madhephaestus/ESP32Servo @ ^3.0.6
    adafruit/Adafruit NeoPixel @ ^1.12.0

[env:master]
board = esp32dev
build_src_filter =
    +<master_main.cpp>
    -<slave_main.cpp>

[env:slave0]
board = esp32-c3-devkitm-1
build_src_filter = +<slave_main.cpp> 
                    -<master_main.cpp>
# Добавляем флаг идентификатора и флаги активации USB CDC
build_flags = 
  -D SLAVE_ID=0
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
monitor_dtr = 0
monitor_rts = 0

[env:slave1]
board = esp32-c3-devkitm-1
build_src_filter = +<slave_main.cpp> 
                    -<master_main.cpp>
# Добавляем флаг идентификатора и флаги активации USB CDC
build_flags = 
  -D SLAVE_ID=1
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
monitor_dtr = 0
monitor_rts = 0

[env:slave2]
board = esp32-c3-devkitm-1
build_src_filter = +<slave_main.cpp> 
                    -<master_main.cpp>
# Добавляем флаг идентификатора и флаги активации USB CDC
build_flags = 
  -D SLAVE_ID=2
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
monitor_dtr = 0
